name: .NET Daily Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [ self-hosted, linux, x64, noble, xlarge ]
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        container_image:
          - docker.io/library/ubuntu:22.04
          - docker.io/library/ubuntu:24.04
          - docker.io/library/ubuntu:25.10
          - docker.io/library/ubuntu:26.04
        branch:
          - main
          - release/8.0.1xx
          - release/9.0.1xx
          - release/10.0.1xx
    container:
      image: ${{ matrix.container_image }}
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pending updates
        run: apt-get update && apt-get upgrade -y

      - name: Install Python
        run: apt-get update && apt-get install -y python3

      - name: Enable -proposed
        run: python3 eng/enable_proposed.py

      - name: Add backports CMake repository
        if: matrix.container_image == 'docker.io/library/ubuntu:22.04' && matrix.branch == 'main'
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:dotnet-bootstrap/cmake-jammy-backports

      - name: Install Required Packages
        run: |
          apt-get update
          apt-get install -y \
            bash-completion \
            build-essential \
            clang \
            curl \
            cmake \
            git \
            libicu-dev \
            libkrb5-dev \
            liblttng-ust-dev \
            libbrotli-dev \
            libssl-dev \
            libunwind-dev \
            lld \
            llvm \
            locales-all \
            ninja-build \
            python3 \
            rapidjson-dev \
            software-properties-common \
            tree \
            zlib1g-dev

      - name: Clone .NET VMR
        run: |
          echo "Cloning .NET VMR..."
          git clone --depth 1 --branch ${{ matrix.branch }} https://github.com/dotnet/dotnet.git dotnet-vmr

      - name: Set build metadata
        id: metadata
        run: |
          # Extract major version from branch name
          BRANCH="${{ matrix.branch }}"
          if [[ "$BRANCH" == "main" ]]; then
            DOTNET_VERSION=11
          else
            DOTNET_VERSION=$(echo "$BRANCH" | grep -oP 'release/\K\d+' || echo "11")
          fi
          echo "dotnet_version=$DOTNET_VERSION" >> $GITHUB_OUTPUT

          # Extract Ubuntu release name from /etc/os-release
          UBUNTU_RELEASE=$(. /etc/os-release && echo $VERSION_CODENAME)
          echo "ubuntu_release=$UBUNTU_RELEASE" >> $GITHUB_OUTPUT

          echo "Building .NET $DOTNET_VERSION on Ubuntu $UBUNTU_RELEASE"

      - name: Build .NET
        id: build
        env:
          MSBUILDDISABLENODEREUSE: 1
        run: |
          DOTNET_VERSION="${{ steps.metadata.outputs.dotnet_version }}"
          BRANCH="${{ matrix.branch }}"

          # Unsetting CI as this is causing errors building aspire on .NET 8 and .NET 9 branches
          # Related to: https://github.com/dotnet/aspire/issues/5956
          unset CI

          echo "Building .NET ${DOTNET_VERSION} from branch ${BRANCH}..."
          python3 dotnet/build_dotnet.py --repo-root dotnet-vmr --dotnet-version "$DOTNET_VERSION"

      - name: Check for OOM Kills
        if: failure() || cancelled()
        uses: ./.github/actions/check-oom-kills

      - name: List installed packages in the system
        if: always()
        run: dpkg-query --list

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet${{ steps.metadata.outputs.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}-artifacts
          path: |
            dotnet-vmr/artifacts/
            !dotnet-vmr/artifacts/obj/
          retention-days: 7

      - name: Create build success sentinel
        if: success()
        run: echo "Build succeeded" > build-success.txt

      - name: Upload build success sentinel
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: build-success-dotnet${{ steps.metadata.outputs.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}
          path: build-success.txt
          retention-days: 7

  test:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: [ self-hosted, linux, x64, noble, xlarge ]
    timeout-minutes: 60
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        container_image:
          - docker.io/library/ubuntu:22.04
          - docker.io/library/ubuntu:24.04
          - docker.io/library/ubuntu:25.10
          - docker.io/library/ubuntu:26.04
        dotnet_version:
          - "8"
          - "9"
          - "10"
          - "11"
    container:
      image: ${{ matrix.container_image }}
      options: --security-opt seccomp=unconfined
      env:
        DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set metadata
        id: metadata
        run: |
          # Extract Ubuntu release name from /etc/os-release
          UBUNTU_RELEASE=$(. /etc/os-release && echo $VERSION_CODENAME)
          echo "ubuntu_release=$UBUNTU_RELEASE" >> $GITHUB_OUTPUT
          echo "Testing .NET ${{ matrix.dotnet_version }} on Ubuntu $UBUNTU_RELEASE"

      - name: Download build success sentinel
        id: check-build
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: build-success-dotnet${{ matrix.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}

      - name: Check build status
        run: |
          if [[ "${{ steps.check-build.outcome }}" != "success" ]]; then
            echo "Corresponding build job failed — skipping tests"
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dotnet${{ matrix.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}-artifacts
          path: artifacts

      - name: Install basic tools
        run: apt-get update && apt-get install --yes git wget tar sudo

      - name: Clone dotnet-regular-tests
        run: git clone https://github.com/canonical/dotnet-regular-tests.git

      - name: Install test dependencies
        timeout-minutes: 5
        run: |
          apt-get update && apt-get install --yes $(grep -A 3 '^#### apt$' dotnet-regular-tests/README.md | tail -n 1 | tr -d '`')

      - name: Extract .NET SDK
        run: |
          set -euo pipefail
          SDK_TAR=$(find artifacts -name 'dotnet-sdk-*.tar.gz' -type f | head -n 1)
          echo "Found SDK: $SDK_TAR"
          mkdir -p /opt/dotnet
          tar -xzf "$SDK_TAR" -C /opt/dotnet
          ln --force --symbolic --relative /opt/dotnet/dotnet /usr/bin/dotnet
          dotnet --info

      - name: Download test runner
        run: |
          set -euo pipefail
          cd dotnet-regular-tests
          wget --no-verbose https://github.com/canonical/dotnet-test-runner/releases/latest/download/turkey.tar.gz
          tar xf turkey.tar.gz

      - name: Run tests
        env:
          DOTNET_ROOT: /opt/dotnet
        run: |
          set -euo pipefail
          cd dotnet-regular-tests
          echo "Creating testrunner user"
          useradd testrunner --create-home
          chown --recursive testrunner:testrunner /home/testrunner/
          mkdir TestResults
          echo "Turkey version:"
          dotnet turkey/Turkey.dll --version
          echo "Running tests with .NET ${{ matrix.dotnet_version }} on ${{ matrix.container_image }}"
          dotnet turkey/Turkey.dll -v --timeout 600 --log-directory TestResults --trait github-ci

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults-${{ steps.metadata.outputs.ubuntu_release }}-dotnet${{ matrix.dotnet_version }}
          path: dotnet-regular-tests/TestResults
          retention-days: 7

