name: .NET Packages Daily Build

on:
  workflow_dispatch:

jobs:
  prepare-source-package:
    name: Prepare .NET source package
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          path: toolchains-ci

      - name: Checkout dotnet-source-build repository
        uses: actions/checkout@v6
        with:
          repository: canonical/dotnet-source-build
          path: dotnet-source-build

      - name: Checkout dotnet/dotnet for version detection
        uses: actions/checkout@v6
        with:
          repository: dotnet/dotnet
          ref: release/10.0.1xx
          sparse-checkout: |
            src/sdk/eng/Versions.props
            src/runtime/eng/Versions.props
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          path: dotnet-dotnet

      # -------------------------------------------------------------------------------------------------
      # This is only temporary while https://github.com/canonical/flamenco/pull/9 is reviewed and merged.
      # Ideally, this should be replaced with a snap install from the store.
      - name: Checkout flamenco repository
        uses: actions/checkout@v6
        with:
          repository: canonical/flamenco
          ref: feat/external-sources-2
          path: flamenco

      - name: Build flamenco
        id: build-flamenco
        uses: canonical/craft-actions/snapcraft/pack@main
        env:
          SNAPCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS: "1"
        with:
          channel: latest/stable
          path: flamenco
          verbosity: verbose

      - name: Install flamenco
        run: sudo snap install --dangerous --devmode flamenco/flamenco_*.snap
      # End of temporary steps for flamenco.
      # -------------------------------------------------------------------------------------------------

      - name: Derive build ID and source version
        id: derive-versions
        run: |
          # Read the version directly from the dotnet/dotnet source tree.
          # For a release branch, the script returns e.g. "10.0.107-10.0.7-0ubuntu1".
          SCRIPT_VERSION=$(python3 toolchains-ci/dotnet/get_version.py \
            --repo-root dotnet-dotnet \
            --product ubuntu-source-package)

          # Strip the -0ubuntu1 suffix to get the upstream portion (e.g. "10.0.107-10.0.7"),
          # which is what build-orig-tarball and dch expect as source-version.
          SOURCE_VERSION="${SCRIPT_VERSION%%-0ubuntu*}"

          CHANGELOG_VERSION=$(dpkg-parsechangelog \
            --file dotnet-source-build/src/changelog.dotnet10.noble \
            --show-field Version \
            --count 1)

          BUILD_ID="$(date -u +%Y%m%d).1"

          echo "source-version=${SOURCE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "Derived source-version: ${SOURCE_VERSION}"
          echo "Derived build-id: ${BUILD_ID}"

          FULL_NEW_VERSION="${SOURCE_VERSION}-0ubuntu1~24.04.1"
          if dpkg --compare-versions "${FULL_NEW_VERSION}" eq "${CHANGELOG_VERSION}"; then
            echo "Version ${SOURCE_VERSION} already at top of changelog, skipping update."
            echo "version-changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version-changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install devscripts
        run: sudo apt-get install -y devscripts

      - name: Update changelog
        if: steps.derive-versions.outputs.version-changed == 'true'
        env:
          DEBFULLNAME: Ubuntu Toolchains CI
          DEBEMAIL: noreply@canonical.com
        run: |
          NEW_VERSION="${{ steps.derive-versions.outputs.source-version }}-0ubuntu1~24.04.1"
          dch \
            --changelog dotnet-source-build/src/changelog.dotnet10.noble \
            --newversion "${NEW_VERSION}" \
            --distribution noble \
            --no-auto-nmu \
            --check-dirname-level 0 \
            "New upstream release."

      - name: Build orig tarball
        id: build-tarball
        uses: canonical/dotnet-source-build/.github/actions/build-orig-tarball@main
        with:
          build-id: ${{ steps.derive-versions.outputs.build-id }}
          deterministic: false
          git-commitish: release/10.0.1xx
          git-repository: https://github.com/dotnet/dotnet
          source-version: ${{ steps.derive-versions.outputs.source-version }}
          vendor-name: 'Canonical Ltd.'

      - name: Generate source package
        run: |
          # flamenco runs under snap confinement with the 'home' plug, so it can
          # only access paths under the user's $HOME. Copy everything it needs
          # into a dedicated user's home, run it there, then retrieve the output.
          sudo useradd --create-home flamenco-ci
          FLAMENCO_HOME=$(sudo -H -u flamenco-ci bash -c 'echo $HOME')

          # Copy the dotnet-source-build tree and the orig tarball into $HOME
          sudo cp -r ${{ github.workspace }}/dotnet-source-build "${FLAMENCO_HOME}/dotnet-source-build"
          sudo mkdir -p "${FLAMENCO_HOME}/dotnet-source-build/dist"
          sudo cp "${{ steps.build-tarball.outputs.tarball-path }}" "${FLAMENCO_HOME}/dotnet-source-build/dist/"
          sudo chown -R flamenco-ci:flamenco-ci "${FLAMENCO_HOME}/dotnet-source-build"

          # Run flamenco from within $HOME so snap confinement is satisfied
          sudo -H -u flamenco-ci bash -c \
            'cd "$HOME/dotnet-source-build" && flamenco pack dotnet10:noble'

          # Retrieve the generated source package back to the workspace
          mkdir -p ${{ github.workspace }}/dotnet-source-build/dist
          sudo cp "${FLAMENCO_HOME}/dotnet-source-build/dist"/dotnet10_* \
            ${{ github.workspace }}/dotnet-source-build/dist/

      - name: Upload source package artifact
        uses: actions/upload-artifact@v7
        with:
          name: dotnet10-noble-source-package
          # We purposely leave out the unpacked tarball
          path: dotnet-source-build/dist/dotnet10_*
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  build-source-package:
    name: Build .NET source package
    runs-on: ubuntu-latest
    needs: prepare-source-package
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6

      - name: Download source package artifact
        uses: actions/download-artifact@v8
        with:
          name: dotnet10-noble-source-package

      - name: Setup build prerequisites
        run: |
          tree -L 2

          sudo apt-get update
          sudo apt-get install -y sbuild ubuntu-dev-tools tree

          # Create $HOME/.mk-sbuild.rc file
          cat <<EOF > ${HOME}/.mk-sbuild.rc
          SCHROOT_CONF_SUFFIX="source-root-users=root,sbuild,admin
          source-root-groups=root,sbuild,admin
          preserve-environment=true"
          EOF

          # Create .sbuildrc file
          cp dotnet/sbuildrc.pl ${HOME}/.sbuildrc
          mkdir -p ${HOME}/sbuild/{build,logs,stats,scratch}

          # Set up schroot's fstab configuration in the runner
          echo "/home/runner /home/runner none rw,bind 0 0" | sudo tee /etc/schroot/sbuild/fstab
          echo "/home/runner/sbuild/scratch /scratch none rw,bind 0 0" | sudo tee -a /etc/schroot/sbuild/fstab

          # Add runner to the sbuild group and set up the schroot.
          sudo usermod -aG sbuild $USER
          sg sbuild -c 'mk-sbuild noble'

      - name: Build source package
        run: |
          sg sbuild -c 'sbuild --verbose --dist=noble ${{ github.workspace }}/dotnet10_*.dsc'
          tree -L 2 sbuild

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dotnet10-noble-deb-packages
          path: ~/sbuild/build/*.deb
          if-no-files-found: error
          retention-days: 7

