name: .NET Packages Daily Build

on:
  workflow_dispatch:

jobs:
  prepare-source-package:
    name: Prepare .NET source package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version:
          - "26.04:resolute"
          - "25.10:questing"
          - "24.04:noble"
        dotnet-git-branch:
          # - "main" # .NET 11 packaging still not available
          - "release/10.0.1xx"
          - "release/9.0.1xx"
          - "release/8.0.1xx"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          path: toolchains-ci

      - name: Checkout dotnet-source-build repository
        uses: actions/checkout@v6
        with:
          repository: canonical/dotnet-source-build
          path: dotnet-source-build

      - name: Checkout dotnet/dotnet for version detection (.NET 9+)
        if: matrix.dotnet-git-branch != 'release/8.0.1xx'
        uses: actions/checkout@v6
        with:
          repository: dotnet/dotnet
          ref: ${{ matrix.dotnet-git-branch }}
          sparse-checkout: |
            src/sdk/eng/Versions.props
            src/runtime/eng/Versions.props
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          path: dotnet-dotnet

      - name: Checkout dotnet/dotnet for version detection (.NET 8)
        if: matrix.dotnet-git-branch == 'release/8.0.1xx'
        uses: actions/checkout@v6
        with:
          repository: dotnet/dotnet
          ref: ${{ matrix.dotnet-git-branch }}
          sparse-checkout: |
            src/installer/eng/Versions.props
            src/runtime/eng/Versions.props
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          path: dotnet-dotnet

      # -------------------------------------------------------------------------------------------------
      # This is only temporary while https://github.com/canonical/flamenco/pull/9 is reviewed and merged.
      # Ideally, this should be replaced with a snap install from the store.
      - name: Checkout flamenco repository
        uses: actions/checkout@v6
        with:
          repository: canonical/flamenco
          ref: feat/external-sources-2
          path: flamenco

      - name: Build flamenco
        id: build-flamenco
        uses: canonical/craft-actions/snapcraft/pack@main
        env:
          SNAPCRAFT_ENABLE_EXPERIMENTAL_EXTENSIONS: "1"
        with:
          channel: latest/stable
          path: flamenco
          verbosity: verbose

      - name: Install flamenco
        run: sudo snap install --dangerous --devmode flamenco/flamenco_*.snap
      # End of temporary steps for flamenco.
      # -------------------------------------------------------------------------------------------------

      - name: Derive build ID and source version
        id: derive-versions
        run: |
          UBUNTU_VERSION=$(echo "${{ matrix.ubuntu-version }}" | cut -d: -f1)
          UBUNTU_RELEASE=$(echo "${{ matrix.ubuntu-version }}" | cut -d: -f2)
          echo "ubuntu-version=${UBUNTU_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ubuntu-release=${UBUNTU_RELEASE}" >> "$GITHUB_OUTPUT"

          # Transform the branch name (e.g. "release/10.0.1xx") into a flamenco source name (e.g. "dotnet10").
          DOTNET_SOURCE_PKG_NAME=${{ matrix.dotnet-git-branch }}
          DOTNET_SOURCE_PKG_NAME=${DOTNET_SOURCE_PKG_NAME#release/} # Remove "release/" prefix
          DOTNET_SOURCE_PKG_NAME=${DOTNET_SOURCE_PKG_NAME%%.*} # Remove everything after the first dot
          DOTNET_SOURCE_PKG_NAME="dotnet${DOTNET_SOURCE_PKG_NAME}"
          echo "Derived DOTNET_SOURCE_PKG_NAME: ${DOTNET_SOURCE_PKG_NAME}"
          echo "source-pkg-name=${DOTNET_SOURCE_PKG_NAME}" >> "$GITHUB_OUTPUT"

          # Read the version directly from the dotnet/dotnet source tree.
          # For a release branch, the script returns e.g. "10.0.107-10.0.7-0ubuntu1".
          SCRIPT_VERSION=$(python3 toolchains-ci/dotnet/get_version.py \
            --repo-root dotnet-dotnet \
            --product ubuntu-source-package)

          # Strip the -0ubuntu1 suffix to get the upstream portion (e.g. "10.0.107-10.0.7"),
          # which is what build-orig-tarball and dch expect as source-version.
          SOURCE_VERSION="${SCRIPT_VERSION%%-0ubuntu*}"

          CHANGELOG_VERSION=$(dpkg-parsechangelog \
            --file dotnet-source-build/src/changelog.${DOTNET_SOURCE_PKG_NAME}.${UBUNTU_RELEASE} \
            --show-field Version \
            --count 1)

          BUILD_ID="$(date -u +%Y%m%d).1"

          echo "source-version=${SOURCE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build-id=${BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "Derived source-version: ${SOURCE_VERSION}"
          echo "Derived build-id: ${BUILD_ID}"

          FULL_NEW_VERSION="${SOURCE_VERSION}-0ubuntu1~${UBUNTU_VERSION}.1"
          if dpkg --compare-versions "${FULL_NEW_VERSION}" eq "${CHANGELOG_VERSION}"; then
            echo "Version ${SOURCE_VERSION} already at top of changelog, skipping update."
            echo "version-changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version-changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install devscripts
        run: sudo apt-get install -y devscripts

      - name: Update changelog
        if: steps.derive-versions.outputs.version-changed == 'true'
        env:
          DEBFULLNAME: Ubuntu Toolchains CI
          DEBEMAIL: noreply@canonical.com
        run: |
          NEW_VERSION="${{ steps.derive-versions.outputs.source-version }}-0ubuntu1~${{ steps.derive-versions.outputs.ubuntu-version }}.1"
          dch \
            --changelog dotnet-source-build/src/changelog.${{ steps.derive-versions.outputs.source-pkg-name }}.${{ steps.derive-versions.outputs.ubuntu-release }} \
            --newversion "${NEW_VERSION}" \
            --distribution ${{ steps.derive-versions.outputs.ubuntu-release }} \
            --no-auto-nmu \
            --check-dirname-level 0 \
            "New upstream release."

      - name: Build orig tarball
        id: build-tarball
        uses: canonical/dotnet-source-build/.github/actions/build-orig-tarball@main
        with:
          build-id: ${{ steps.derive-versions.outputs.build-id }}
          deterministic: false
          git-commitish: ${{ matrix.dotnet-git-branch }}
          git-repository: https://github.com/dotnet/dotnet
          source-version: ${{ steps.derive-versions.outputs.source-version }}
          vendor-name: 'Canonical Ltd.'

      - name: Generate source package
        id: generate-source-package
        run: |
          # flamenco runs under snap confinement with the 'home' plug, so it can
          # only access paths under the user's $HOME. Copy everything it needs
          # into a dedicated user's home, run it there, then retrieve the output.
          sudo useradd --create-home flamenco-ci
          FLAMENCO_HOME=$(sudo -H -u flamenco-ci bash -c 'echo $HOME')

          # Copy the dotnet-source-build tree and the orig tarball into $HOME
          sudo cp -r ${{ github.workspace }}/dotnet-source-build "${FLAMENCO_HOME}/dotnet-source-build"
          sudo mkdir -p "${FLAMENCO_HOME}/dotnet-source-build/dist"
          sudo cp "${{ steps.build-tarball.outputs.tarball-path }}" "${FLAMENCO_HOME}/dotnet-source-build/dist/"
          sudo chown -R flamenco-ci:flamenco-ci "${FLAMENCO_HOME}/dotnet-source-build"

          # Run flamenco from within $HOME so snap confinement is satisfied
          sudo -H -u flamenco-ci bash -c \
            "cd \"${FLAMENCO_HOME}/dotnet-source-build\" && flamenco pack ${{ steps.derive-versions.outputs.source-pkg-name }}:${{ steps.derive-versions.outputs.ubuntu-release }}"

          # Retrieve the generated source package back to the workspace
          mkdir -p ${{ github.workspace }}/dotnet-source-build/dist
          sudo cp "${FLAMENCO_HOME}/dotnet-source-build/dist"/${{ steps.derive-versions.outputs.source-pkg-name }}_* \
            ${{ github.workspace }}/dotnet-source-build/dist/

      - name: Upload source package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.derive-versions.outputs.source-pkg-name }}-${{ steps.derive-versions.outputs.ubuntu-release }}-source-package
          # We purposely leave out the unpacked tarball
          path: dotnet-source-build/dist/${{ steps.derive-versions.outputs.source-pkg-name }}_*
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  build-source-package:
    name: Build .NET source package
    runs-on: [ self-hosted, linux, x64, noble, xlarge ]
    needs: prepare-source-package
    strategy:
      fail-fast: false
      matrix:
        ubuntu-release:
          - "resolute"
          - "questing"
          - "noble"
        dotnet-source-packages:
          - "dotnet10"
          - "dotnet9"
          - "dotnet8"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6

      - name: Download source package artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.dotnet-source-packages }}-${{ matrix.ubuntu-release }}-source-package

      - name: Setup build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y sbuild ubuntu-dev-tools tree

          # Create $HOME/.mk-sbuild.rc file
          echo "Creating ${HOME}/.mk-sbuild.rc with schroot configuration for sbuild."
          cat <<EOF > ${HOME}/.mk-sbuild.rc
          SCHROOT_CONF_SUFFIX="source-root-users=root,sbuild,admin
          source-root-groups=root,sbuild,admin
          preserve-environment=true"
          EOF
          echo "Contents of ${HOME}/.mk-sbuild.rc:"
          cat ${HOME}/.mk-sbuild.rc

          # Create .sbuildrc file
          echo "Creating ${HOME}/.sbuildrc with sbuild configuration."
          cp dotnet/sbuildrc.pl ${HOME}/.sbuildrc
          mkdir -p ${HOME}/sbuild/{build,logs,stats,scratch}
          echo "Contents of ${HOME}/.sbuildrc:"
          cat ${HOME}/.sbuildrc

          # Set up schroot's fstab configuration in the runner
          echo "Setting up schroot fstab configuration for sbuild."
          echo "${HOME} ${HOME} none rw,bind 0 0" | sudo tee -a /etc/schroot/sbuild/fstab
          echo "${HOME}/sbuild/scratch /scratch none rw,bind 0 0" | sudo tee -a /etc/schroot/sbuild/fstab
          echo "Contents of /etc/schroot/sbuild/fstab:"
          cat /etc/schroot/sbuild/fstab

          # Add ubuntu to the sbuild group and set up the schroot.
          echo "Adding user 'ubuntu' to 'sbuild' group and setting up schroot."
          sudo usermod -aG sbuild $USER
          echo "Creating schroot"
          sg sbuild -c 'mk-sbuild ${{ matrix.ubuntu-release }}'

      - name: Build source package
        run: |
          sg sbuild -c \
            "sbuild \
            --extra-repository='deb [trusted=yes] http://ppa.launchpadcontent.net/dotnet/backports/ubuntu ${{ matrix.ubuntu-release }} main' \
            --verbose --dist=${{ matrix.ubuntu-release }} ${{ github.workspace }}/${{ matrix.dotnet-source-packages }}_*.dsc"

      - name: List generated files
        run: |
          echo "Listing generated files:"
          tree -L 3 ${HOME}/sbuild

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.dotnet-source-packages }}-${{ matrix.ubuntu-release }}-deb-packages
          path: /home/ubuntu/sbuild/build/*.deb
          if-no-files-found: error
          retention-days: 7

  test-source-package:
    runs-on: ubuntu-latest
    if: always()
    needs: build-source-package
    strategy:
      fail-fast: false
      matrix:
        ubuntu-release:
          - "resolute"
          - "questing"
          - "noble"
        dotnet-source-packages:
          - "dotnet10"
          - "dotnet9"
          - "dotnet8"
    defaults:
      run:
        shell: bash

    steps:
      - name: Download source package artifact
        id: download-source-package
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.dotnet-source-packages }}-${{ matrix.ubuntu-release }}-source-package

      - name: Download binary packages artifact
        id: download-binary-packages
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.dotnet-source-packages }}-${{ matrix.ubuntu-release }}-deb-packages

      - name: Install test prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes autopkgtest qemu-system-x86 genisoimage distro-info tree

      - name: Grant KVM permissions
        run: sudo chown $USER /dev/kvm

      - name: Build autopkgtest runner image
        run: |
          autopkgtest-buildvm-ubuntu-cloud \
            --release ${{ matrix.ubuntu-release }} \
            --verbose \
            --cpus $(nproc) \
            --output ${{ github.workspace }}

      - name: Run autopkgtest
        run: |
          echo "Binary packages download path content:"
          tree ${{ steps.download-binary-packages.outputs.download-path }}

          echo "Source package download path content:"
          tree ${{ steps.download-source-package.outputs.download-path }}

          autopkgtest \
            --no-built-binaries \
            --apt-upgrade \
            --env=REGULAR_TESTS_IGNORE_NU1102_ERRORS=1 --env=REGULAR_TESTS_TOOLCHAINS_CI=1 \
            --copy=${{ steps.download-binary-packages.outputs.download-path }}:/home/ubuntu/dotnet-packages \
            --setup-commands="sudo apt-get install --yes /home/ubuntu/dotnet-packages/*.deb" \
            ${{ steps.download-source-package.outputs.download-path }}/${{ matrix.dotnet-source-packages }}_*.dsc -- \
              qemu -c $(nproc) ${{ github.workspace }}/autopkgtest-${{ matrix.ubuntu-release }}-amd64.img

