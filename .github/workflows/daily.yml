name: .NET Daily Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        container_image:
          - docker.io/library/ubuntu:22.04
          - docker.io/library/ubuntu:24.04
          - docker.io/library/ubuntu:25.10
          - docker.io/library/ubuntu:26.04
        branch:
          - main
          - release/8.0.1xx
          - release/9.0.1xx
          - release/10.0.1xx
    container:
      image: ${{ matrix.container_image }}
      options: --security-opt seccomp=unconfined
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable -proposed
        run: sudo python3 enable_proposed.py

      - name: Install Required Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash-completion \
            clang \
            cmake \
            git \
            libicu-dev \
            libkrb5-dev \
            liblttng-ust-dev \
            libbrotli-dev \
            libssl-dev \
            libunwind-dev \
            lld \
            llvm \
            locales-all \
            python3 \
            rapidjson-dev \
            tree \
            zlib1g-dev

      - name: Clone .NET VMR
        run: |
          echo "Cloning .NET VMR..."
          git clone --depth 1 --branch ${{ matrix.branch }} https://github.com/dotnet/dotnet.git dotnet-vmr

      - name: Set build metadata
        id: metadata
        run: |
          # Extract major version from branch name
          BRANCH="${{ matrix.branch }}"
          if [[ "$BRANCH" == "main" ]]; then
            DOTNET_VERSION=11
          else
            DOTNET_VERSION=$(echo "$BRANCH" | grep -oP 'release/\K\d+' || echo "11")
          fi
          echo "dotnet_version=$DOTNET_VERSION" >> $GITHUB_OUTPUT

          # Extract Ubuntu release name from /etc/os-release
          UBUNTU_RELEASE=$(. /etc/os-release && echo $VERSION_CODENAME)
          echo "ubuntu_release=$UBUNTU_RELEASE" >> $GITHUB_OUTPUT

          echo "Building .NET $DOTNET_VERSION on Ubuntu $UBUNTU_RELEASE"

      - name: Build .NET
        id: build
        continue-on-error: true
        run: |
          DOTNET_VERSION="${{ steps.metadata.outputs.dotnet_version }}"
          BRANCH="${{ matrix.branch }}"
          echo "Building .NET ${DOTNET_VERSION} from branch ${BRANCH}..."
          python3 build_dotnet.py --repo-root dotnet-vmr --dotnet-version "$DOTNET_VERSION"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dotnet${{ steps.metadata.outputs.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}-artifacts
          path: dotnet-vmr/artifacts/
          retention-days: 7

