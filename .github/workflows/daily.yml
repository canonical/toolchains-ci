name: .NET Daily Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: [ self-hosted, linux, x64, noble, xlarge ]
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        container_image:
          - docker.io/library/ubuntu:22.04
          - docker.io/library/ubuntu:24.04
          - docker.io/library/ubuntu:25.10
          - docker.io/library/ubuntu:26.04
        branch:
          - main
          - release/8.0.1xx
          - release/9.0.1xx
          - release/10.0.1xx
    container:
      image: ${{ matrix.container_image }}
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Python
        run: apt-get update && apt-get install -y python3

      - name: Enable -proposed
        run: python3 enable_proposed.py

      - name: Install Required Packages
        run: |
          apt-get update
          apt-get install -y \
            bash-completion \
            build-essential \
            clang \
            curl \
            cmake \
            git \
            libicu-dev \
            libkrb5-dev \
            liblttng-ust-dev \
            libbrotli-dev \
            libssl-dev \
            libunwind-dev \
            lld \
            llvm \
            locales-all \
            ninja-build \
            python3 \
            rapidjson-dev \
            software-properties-common \
            tree \
            zlib1g-dev

      - name: Clone .NET VMR
        run: |
          echo "Cloning .NET VMR..."
          git clone --depth 1 --branch ${{ matrix.branch }} https://github.com/dotnet/dotnet.git dotnet-vmr

      - name: Set build metadata
        id: metadata
        run: |
          # Extract major version from branch name
          BRANCH="${{ matrix.branch }}"
          if [[ "$BRANCH" == "main" ]]; then
            DOTNET_VERSION=11
          else
            DOTNET_VERSION=$(echo "$BRANCH" | grep -oP 'release/\K\d+' || echo "11")
          fi
          echo "dotnet_version=$DOTNET_VERSION" >> $GITHUB_OUTPUT

          # Extract Ubuntu release name from /etc/os-release
          UBUNTU_RELEASE=$(. /etc/os-release && echo $VERSION_CODENAME)
          echo "ubuntu_release=$UBUNTU_RELEASE" >> $GITHUB_OUTPUT

          echo "Building .NET $DOTNET_VERSION on Ubuntu $UBUNTU_RELEASE"

      - name: Build .NET
        id: build
        env:
          MSBUILDDISABLENODEREUSE: 1
        run: |
          DOTNET_VERSION="${{ steps.metadata.outputs.dotnet_version }}"
          BRANCH="${{ matrix.branch }}"
          echo "Building .NET ${DOTNET_VERSION} from branch ${BRANCH}..."
          python3 build_dotnet.py --repo-root dotnet-vmr --dotnet-version "$DOTNET_VERSION"

      - name: Check for OOM Kills
        if: failure() || cancelled()
        run: |
          echo "=== Container Memory Events ==="
          if [ -f /sys/fs/cgroup/memory.events ]; then
            cat /sys/fs/cgroup/memory.events

            # Extract the oom_kill count
            OOM_KILLS=$(grep oom_kill /sys/fs/cgroup/memory.events | awk '{print $2}')

            if [ -n "$OOM_KILLS" ] && [ "$OOM_KILLS" -gt 0 ]; then
              echo "::error:: OOM Kill detected! The container ran out of memory."
              exit 1
            else
              echo "No OOM kills recorded in cgroup."
            fi
          else
            echo "cgroup v2 memory.events file not found. Runner might be using cgroup v1."
            # Fallback for cgroup v1 just in case
            if [ -f /sys/fs/cgroup/memory/memory.oom_control ]; then
               cat /sys/fs/cgroup/memory/memory.oom_control
            fi
          fi

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet${{ steps.metadata.outputs.dotnet_version }}-${{ steps.metadata.outputs.ubuntu_release }}-${{ github.run_id }}-artifacts
          path: dotnet-vmr/artifacts/
          retention-days: 7

